name: Sync Profile README on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  sync-readme:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0

      - name: Download main README from GitHub
        run: |
          mkdir -p .github/profile
          curl -sSL -o .github/profile/README.md https://raw.githubusercontent.com/ElicitSoftware/Elicit/main/README.md

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/profile/README.md
          git commit -m "Sync profile README from main README on tag ${{ github.ref }}" || echo "No changes to commit"
          git push origin HEAD:main
